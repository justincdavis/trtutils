name: Ty
on: [ push ]
jobs:
  Typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[ci]" ".[test]"

      - name: Type Check
        run: ./ci/run_type_check.sh
