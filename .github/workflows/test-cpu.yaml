name: Test CPU
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e "." pytest pytest-timeout
      - name: Run CPU tests
        env:
          TRTUTILS_IGNORE_MISSING_CUDA: "1"
        run: python -m pytest -m cpu tests/benchmark/ tests/core/test_cache.py -rP -v
